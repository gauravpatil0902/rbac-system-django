{% extends 'accounts/base.html' %}

{% block content %}
<div class="box">
    <h2>Teacher Sign Up</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create teacher account</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
</div>
{% endblock %}
